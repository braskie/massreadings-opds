name: Deploy OPDS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Build the next 2 weeks of readings
        run: |
          python - <<'PY'
          from datetime import date, timedelta
          from pathlib import Path

          from usccb_to_epub.epub import build_book_files
          from usccb_to_epub.scraper import fetch_readings

          library_dir = Path('data/library')
          for offset in range(14):
              reading_date = date.today() + timedelta(days=offset)
              readings = fetch_readings(reading_date)
              build_book_files(readings, library_dir)
          PY

      - name: Build static OPDS site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          python -m usccb_to_epub publish-static \
            --library-dir data/library \
            --output-dir docs \
            --site-url "$SITE_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
